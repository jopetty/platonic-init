data_path: data/synthetic.txt
stages:
  prepretrain:
    training:
      model_name_or_path: gpt2
      block_size: 2048
      max_steps: 300
      per_device_train_batch_size: 8
      gradient_accumulation_steps: 1
      learning_rate: 0.0003
      warmup_steps: 500
      warmup_ratio: 0.03
      min_lr_rate: 0.1
      weight_decay: 0.01
      save_steps: 100
      logging_steps: 10
      pretrain_packing: true
      prepretrain_char_tokenizer: false
      bf16: true
      fp16: false
      prefer_flash_attention_2: true
      report_to: ["wandb"]
      run_name: synthetic_prepretrain
      wandb_project: platonic-init
      wandb_entity: null
    sweep:
      seeds: [0, 1, 2, 3, 4, 5, 6, 7]
      output_root: runs
      experiment_name: synthetic_prepretrain
  fit_initializations:
    analysis:
      top_k_components: 8
      max_params_per_tensor: null
      dtype: float32
    rebasin:
      enabled: true
      max_iter: 50
      seed: 0
    fit_blocks:
      - name: chebyshev
        basis_type: chebyshev
        chebyshev_degree: 16
      - name: fourier
        basis_type: fourier
        fourier_degree: 8
      - name: rbf
        basis_type: rbf
        rbf_num_centers: 12
        rbf_sigma: 0.08
      - name: poly_exp
        basis_type: poly_exp
        poly_degree: 5
        exp_scales: [0.5, 1.0, 2.0, 4.0]
  pretrain_eval:
    train_steps: 10000
    eval_every: 100
    init_eval_data:
      source: hf
      dataset_name: wikitext
      dataset_config_name: wikitext-2-raw-v1
      train_split: train
      eval_split: validation
      text_field: text
      local_data_path: null
      max_train_samples: 10000
      max_eval_samples: 2000
