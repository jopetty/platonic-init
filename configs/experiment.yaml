data_path: data/synthetic.txt
training:
  model_name_or_path: gpt2
  block_size: 128
  max_steps: 300
  per_device_train_batch_size: 8
  gradient_accumulation_steps: 1
  learning_rate: 0.0003
  warmup_ratio: 0.03
  weight_decay: 0.01
  save_steps: 100
  logging_steps: 10
  bf16: false
  fp16: false
  report_to: ["wandb"]
  run_name: synthetic_prepretrain
  wandb_project: platonic-init
  wandb_entity: null
sweep:
  seeds: [0, 1, 2, 3, 4, 5, 6, 7]
  output_root: runs
  experiment_name: synthetic_prepretrain
analysis:
  top_k_components: 8
  max_params_per_tensor: null
  dtype: float32
analytic_fit:
  basis_type: poly_exp
  poly_degree: 5
  exp_scales: [0.5, 1.0, 2.0, 4.0]
