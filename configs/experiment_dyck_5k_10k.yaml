data_path: data/dyck_d10_40k.txt

# Layout conventions after migration:
# - Pre-pretraining checkpoints: runs/prepretraining/<experiment_name>/<model_key>/seed_*
# - Pretraining eval runs: runs/pretraining/<experiment_name>/...
# - Artifacts: artifacts/experiments/<experiment_name>/{analysis,pretraining}/...
stages:
  prepretrain:
    training:
      model_name_or_path: sshleifer/tiny-gpt2
      block_size: 2048
      # null => train one full pass over the pre-pretraining dataset
      max_steps: null
      per_device_train_batch_size: 8
      gradient_accumulation_steps: 1
      learning_rate: 0.0003
      warmup_steps: 500
      warmup_ratio: 0.03
      min_lr_rate: 0.1
      weight_decay: 0.01
      save_steps: 1000
      logging_steps: 10
      pretrain_packing: true
      prepretrain_char_tokenizer: false
      bf16: true
      fp16: false
      prefer_flash_attention_2: true
      report_to: ["wandb"]
      run_name: dyck_5k_10k-prepretraining
      wandb_project: platonic-init
      wandb_entity: null
    sweep:
      seeds: [0, 1, 2, 3, 4, 5, 6, 7]
      output_root: runs
      experiment_name: dyck_5k_10k
  fit_initializations:
    analysis:
      top_k_components: 7
      max_params_per_tensor: null
      dtype: float32
    rebasin:
      enabled: true
      max_iter: 50
      seed: 0
    fit_blocks:
      - name: chebyshev_d6
        basis_type: chebyshev
        chebyshev_degree: 6
      - name: chebyshev
        basis_type: chebyshev
        chebyshev_degree: 12
      - name: chebyshev_d24
        basis_type: chebyshev
        chebyshev_degree: 24
      - name: chebyshev_d48
        basis_type: chebyshev
        chebyshev_degree: 48
      - name: chebyshev_d128
        basis_type: chebyshev
        chebyshev_degree: 128
  pretrain_eval:
    train_steps: 10000
    eval_every: 100
    init_eval_data:
      source: hf
      dataset_name: wikitext
      dataset_config_name: wikitext-2-raw-v1
      train_split: train
      eval_split: validation
      text_field: text
      local_data_path: null
      max_train_samples: null
      max_eval_samples: 1000
