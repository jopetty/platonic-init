data_path: data/shuffle_dyck_k64_d10_20k.txt

stages:
  prepretrain:
    training:
      model_name_or_path: sshleifer/tiny-gpt2
      block_size: 1024
      max_steps: 1000
      per_device_train_batch_size: 8
      gradient_accumulation_steps: 1
      learning_rate: 0.0003
      warmup_steps: null
      warmup_ratio: 0.1
      min_lr_rate: 0.1
      optimizer_type: muon
      weight_decay: 0.01
      adam_beta1: 0.9
      adam_beta2: 0.95
      adam_epsilon: 1.0e-08
      muon_learning_rate: 0.02
      muon_momentum: 0.95
      muon_ns_steps: 5
      muon_nesterov: true
      save_steps: 200
      logging_steps: 10
      pretrain_packing: true
      prepretrain_char_tokenizer: false
      bf16: true
      fp16: false
      prefer_flash_attention_2: true
      report_to: ["wandb"]
      run_name: gpt2-tiny-shuffle-dyck-c4-muon
      wandb_project: platonic-init
      wandb_entity: null
    sweep:
      seeds: [0, 1, 2]
      output_root: runs
      experiment_name: gpt2_tiny_c4_ppt_reproduction_muon
  fit_initializations:
    analysis:
      top_k_components: 4
      max_params_per_tensor: null
      dtype: float32
    rebasin:
      enabled: true
      max_iter: 50
      seed: 0
    fit_blocks:
      - name: chebyshev_d6
        basis_type: chebyshev
        chebyshev_degree: 6
      - name: chebyshev_d8
        basis_type: chebyshev
        chebyshev_degree: 8
      - name: chebyshev_d16
        basis_type: chebyshev
        chebyshev_degree: 16
      - name: chebyshev_d32
        basis_type: chebyshev
        chebyshev_degree: 32
      - name: chebyshev_d64
        basis_type: chebyshev
        chebyshev_degree: 64
      - name: chebyshev_d128
        basis_type: chebyshev
        chebyshev_degree: 128
      - name: chebyshev_d256
        basis_type: chebyshev
        chebyshev_degree: 256
      - name: chebyshev_d512
        basis_type: chebyshev
        chebyshev_degree: 512
      - name: chebyshev_d1024
        basis_type: chebyshev
        chebyshev_degree: 1024
  pretrain_eval:
    train_steps: 10000
    eval_every: 100
    logging_steps: 10
    init_eval_data:
      source: hf
      dataset_name: allenai/c4
      dataset_config_name: en
      train_split: train
      eval_split: validation
      text_field: text
      local_data_path: null
      max_train_samples: null
      max_eval_samples: 1000
